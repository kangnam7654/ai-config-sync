step: "13"
agent: "backend-dev"
api_standard: "REST (JSON)"
base_url: "/api"

endpoints:
  - method: "GET"
    path: "/api/todos"
    description: "전체 할일 목록 조회"
    request_params: []
    response:
      status: 200
      body: "Todo[]"
      schema: |
        [
          {
            "id": 1,
            "title": "할일 제목",
            "completed": false,
            "created_at": "2026-03-24T12:00:00",
            "updated_at": "2026-03-24T12:00:00"
          }
        ]

  - method: "POST"
    path: "/api/todos"
    description: "새 할일 생성"
    request_body:
      content_type: "application/json"
      schema: |
        {
          "title": "string (required, 1-200자)"
        }
    response:
      status: 201
      body: "Todo"

  - method: "PATCH"
    path: "/api/todos/{todo_id}"
    description: "할일 완료 상태 토글"
    path_params:
      - name: "todo_id"
        type: "int"
    request_body:
      content_type: "application/json"
      schema: |
        {
          "completed": "boolean (required)"
        }
    response:
      status: 200
      body: "Todo"
    errors:
      - status: 404
        body: '{"detail": "Todo not found"}'

  - method: "DELETE"
    path: "/api/todos/{todo_id}"
    description: "할일 삭제"
    path_params:
      - name: "todo_id"
        type: "int"
    response:
      status: 204
      body: "null"
    errors:
      - status: 404
        body: '{"detail": "Todo not found"}'

pydantic_schemas:
  - name: "TodoCreate"
    fields:
      - name: "title"
        type: "str"
        constraints: "min_length=1, max_length=200"

  - name: "TodoUpdate"
    fields:
      - name: "completed"
        type: "bool"

  - name: "TodoResponse"
    fields:
      - name: "id"
        type: "int"
      - name: "title"
        type: "str"
      - name: "completed"
        type: "bool"
      - name: "created_at"
        type: "datetime"
      - name: "updated_at"
        type: "datetime"

cors:
  allow_origins: ["http://localhost:5173"]
  allow_methods: ["GET", "POST", "PATCH", "DELETE"]
  allow_headers: ["*"]

authentication: "없음 (단일 사용자)"
