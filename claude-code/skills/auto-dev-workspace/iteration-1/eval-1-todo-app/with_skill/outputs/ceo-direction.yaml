  - "할일 추가: 제목 입력으로 새 할일 생성"
  - "할일 삭제: 개별 할일 영구 삭제"
  - "할일 완료: 완료/미완료 토글"
differentiator: "기술 학습용 레퍼런스 구현으로서, React+FastAPI+SQLite 풀스택의 최소 기능 완성형(MVC) 아키텍처를 명확히 보여준다."
direction_rationale: "사용자가 기술 스택과 기능을 명확히 지정. 부가 기능 없이 3가지 핵심 기능에 집중하여 빠른 구현과 검증을 우선한다."
