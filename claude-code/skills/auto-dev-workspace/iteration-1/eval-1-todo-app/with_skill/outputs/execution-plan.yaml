step: "23"
agent: "planner"

file_structure:
  root: "/tmp/auto-dev-test-todo"
  backend:
    - "backend/main.py"           # FastAPI 앱 엔트리포인트, CORS, 라우터 등록
    - "backend/database.py"       # DB 엔진, 세션, Base 정의
    - "backend/models.py"         # SQLAlchemy Todo 모델
    - "backend/schemas.py"        # Pydantic 스키마 (TodoCreate, TodoUpdate, TodoResponse)
    - "backend/crud.py"           # CRUD 함수 (get_todos, create_todo, update_todo, delete_todo)
    - "backend/routers/todos.py"  # /api/todos 라우터
    - "backend/pyproject.toml"    # Python 프로젝트 설정 (uv)
  frontend:
    - "frontend/src/App.tsx"           # 메인 앱 컴포넌트
    - "frontend/src/App.module.css"    # 앱 스타일
    - "frontend/src/components/TodoInput.tsx"    # 할일 입력 컴포넌트
    - "frontend/src/components/TodoInput.module.css"
    - "frontend/src/components/TodoItem.tsx"     # 할일 항목 컴포넌트
    - "frontend/src/components/TodoItem.module.css"
    - "frontend/src/components/TodoList.tsx"     # 할일 목록 컴포넌트
    - "frontend/src/components/TodoList.module.css"
    - "frontend/src/types/todo.ts"     # Todo 타입 정의
    - "frontend/src/api/todoApi.ts"    # API 호출 함수
    - "frontend/src/main.tsx"          # React 엔트리포인트
    - "frontend/src/index.css"         # 글로벌 스타일
    - "frontend/index.html"            # HTML 템플릿
    - "frontend/package.json"          # npm 프로젝트 설정
    - "frontend/tsconfig.json"         # TypeScript 설정
    - "frontend/vite.config.ts"        # Vite 설정

execution_order:
  - step: 1
    description: "Backend 프로젝트 초기화"
    files: ["backend/pyproject.toml"]
    actions: "uv init, 의존성 추가 (fastapi, uvicorn, sqlalchemy, aiosqlite)"

  - step: 2
    description: "DB 레이어 구현"
    files: ["backend/database.py", "backend/models.py"]
    actions: "async 엔진/세션 팩토리, Todo 모델 정의"

  - step: 3
    description: "Pydantic 스키마 정의"
    files: ["backend/schemas.py"]
    actions: "TodoCreate, TodoUpdate, TodoResponse 스키마"

  - step: 4
    description: "CRUD 함수 구현"
    files: ["backend/crud.py"]
    actions: "get_todos, create_todo, update_todo, delete_todo"

  - step: 5
    description: "API 라우터 구현"
    files: ["backend/routers/todos.py"]
    actions: "4개 엔드포인트 (GET, POST, PATCH, DELETE)"

  - step: 6
    description: "FastAPI 앱 조립"
    files: ["backend/main.py"]
    actions: "앱 생성, CORS, 라우터 등록, DB 초기화 이벤트"

  - step: 7
    description: "Frontend 프로젝트 초기화"
    files: ["frontend/package.json", "frontend/tsconfig.json", "frontend/vite.config.ts", "frontend/index.html"]
    actions: "Vite + React + TypeScript 프로젝트 설정"

  - step: 8
    description: "타입 + API 클라이언트"
    files: ["frontend/src/types/todo.ts", "frontend/src/api/todoApi.ts"]
    actions: "Todo 타입 정의, fetch 기반 API 함수"

  - step: 9
    description: "UI 컴포넌트 구현"
    files: [
      "frontend/src/components/TodoInput.tsx",
      "frontend/src/components/TodoInput.module.css",
      "frontend/src/components/TodoItem.tsx",
      "frontend/src/components/TodoItem.module.css",
      "frontend/src/components/TodoList.tsx",
      "frontend/src/components/TodoList.module.css"
    ]
    actions: "TodoInput, TodoItem, TodoList 컴포넌트 + CSS Modules"

  - step: 10
    description: "앱 조립 + 글로벌 스타일"
    files: ["frontend/src/App.tsx", "frontend/src/App.module.css", "frontend/src/main.tsx", "frontend/src/index.css"]
    actions: "App 컴포넌트에서 상태 관리, 컴포넌트 조합"

dependencies:
  - "step 5 depends on step 2, 3, 4 (라우터가 모델/스키마/CRUD 사용)"
  - "step 6 depends on step 5 (앱이 라우터 등록)"
  - "step 8 depends on step 3 (프론트 타입이 백엔드 스키마와 일치해야 함)"
  - "step 9, 10 depends on step 8 (컴포넌트가 API 함수/타입 사용)"
