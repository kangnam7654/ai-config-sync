step: "13"
agent: "backend-dev"
status: "COMPLETE"
timestamp: "2026-03-28T13:05:00+09:00"
api_standard:
  base_url: "/api/v1"
  protocol: "REST"
  auth: "JWT Bearer token"
  naming: "snake_case"
  pagination: "cursor-based (next_cursor param)"
  error_format: "{ error: { code: string, message: string, detail: string | null } }"

endpoints:
  auth:
    - method: "POST"
      path: "/api/v1/auth/register"
      request: "{ email: string, username: string, password: string, display_name: string }"
      response: "{ user: UserResponse, access_token: string, refresh_token: string }"
      auth_required: false
      status_codes: [201, 400, 409]

    - method: "POST"
      path: "/api/v1/auth/login"
      request: "{ email: string, password: string }"
      response: "{ user: UserResponse, access_token: string, refresh_token: string }"
      auth_required: false
      status_codes: [200, 401]

    - method: "POST"
      path: "/api/v1/auth/refresh"
      request: "{ refresh_token: string }"
      response: "{ access_token: string, refresh_token: string }"
      auth_required: false
      status_codes: [200, 401]

  users:
    - method: "GET"
      path: "/api/v1/users/{user_id}"
      response: "{ user: UserProfileResponse }"
      auth_required: false
      status_codes: [200, 404]

    - method: "PATCH"
      path: "/api/v1/users/me"
      request: "{ display_name?: string, bio?: string, avatar_url?: string }"
      response: "{ user: UserResponse }"
      auth_required: true
      status_codes: [200, 400, 401]

    - method: "GET"
      path: "/api/v1/users/{user_id}/recipes"
      query: "?cursor=string&limit=int"
      response: "{ recipes: RecipeListItem[], next_cursor: string | null }"
      auth_required: false
      status_codes: [200, 404]

  recipes:
    - method: "POST"
      path: "/api/v1/recipes"
      request: "{ title: string, description: string, category: string, cooking_time_minutes?: int, servings?: int, thumbnail_url?: string, ingredients: IngredientInput[], steps: StepInput[], tags: string[] }"
      response: "{ recipe: RecipeDetailResponse }"
      auth_required: true
      status_codes: [201, 400, 401]

    - method: "GET"
      path: "/api/v1/recipes/{recipe_id}"
      response: "{ recipe: RecipeDetailResponse }"
      auth_required: false
      status_codes: [200, 404]

    - method: "PATCH"
      path: "/api/v1/recipes/{recipe_id}"
      request: "{ title?: string, description?: string, category?: string, cooking_time_minutes?: int, servings?: int, thumbnail_url?: string, ingredients?: IngredientInput[], steps?: StepInput[], tags?: string[] }"
      response: "{ recipe: RecipeDetailResponse }"
      auth_required: true
      status_codes: [200, 400, 401, 403, 404]

    - method: "DELETE"
      path: "/api/v1/recipes/{recipe_id}"
      response: "{ message: string }"
      auth_required: true
      status_codes: [200, 401, 403, 404]

  feed:
    - method: "GET"
      path: "/api/v1/feed"
      query: "?cursor=string&limit=int"
      response: "{ recipes: RecipeListItem[], next_cursor: string | null }"
      auth_required: true
      description: "팔로우 기반 타임라인 피드"
      status_codes: [200, 401]

    - method: "GET"
      path: "/api/v1/feed/popular"
      query: "?cursor=string&limit=int"
      response: "{ recipes: RecipeListItem[], next_cursor: string | null }"
      auth_required: false
      description: "인기 레시피 (like_count DESC)"
      status_codes: [200]

    - method: "GET"
      path: "/api/v1/recipes/search"
      query: "?q=string&category=string&tag=string&cursor=string&limit=int"
      response: "{ recipes: RecipeListItem[], next_cursor: string | null }"
      auth_required: false
      status_codes: [200]

  likes:
    - method: "POST"
      path: "/api/v1/recipes/{recipe_id}/like"
      response: "{ liked: true, like_count: int }"
      auth_required: true
      status_codes: [200, 401, 404, 409]

    - method: "DELETE"
      path: "/api/v1/recipes/{recipe_id}/like"
      response: "{ liked: false, like_count: int }"
      auth_required: true
      status_codes: [200, 401, 404]

  comments:
    - method: "GET"
      path: "/api/v1/recipes/{recipe_id}/comments"
      query: "?cursor=string&limit=int"
      response: "{ comments: CommentResponse[], next_cursor: string | null }"
      auth_required: false
      status_codes: [200, 404]

    - method: "POST"
      path: "/api/v1/recipes/{recipe_id}/comments"
      request: "{ content: string, parent_id?: uuid }"
      response: "{ comment: CommentResponse }"
      auth_required: true
      status_codes: [201, 400, 401, 404]

    - method: "DELETE"
      path: "/api/v1/comments/{comment_id}"
      response: "{ message: string }"
      auth_required: true
      status_codes: [200, 401, 403, 404]

  bookmarks:
    - method: "POST"
      path: "/api/v1/recipes/{recipe_id}/bookmark"
      response: "{ bookmarked: true }"
      auth_required: true
      status_codes: [200, 401, 404, 409]

    - method: "DELETE"
      path: "/api/v1/recipes/{recipe_id}/bookmark"
      response: "{ bookmarked: false }"
      auth_required: true
      status_codes: [200, 401, 404]

    - method: "GET"
      path: "/api/v1/users/me/bookmarks"
      query: "?cursor=string&limit=int"
      response: "{ recipes: RecipeListItem[], next_cursor: string | null }"
      auth_required: true
      status_codes: [200, 401]

  follows:
    - method: "POST"
      path: "/api/v1/users/{user_id}/follow"
      response: "{ following: true }"
      auth_required: true
      status_codes: [200, 401, 404, 409]

    - method: "DELETE"
      path: "/api/v1/users/{user_id}/follow"
      response: "{ following: false }"
      auth_required: true
      status_codes: [200, 401, 404]

    - method: "GET"
      path: "/api/v1/users/{user_id}/followers"
      query: "?cursor=string&limit=int"
      response: "{ users: UserListItem[], next_cursor: string | null }"
      auth_required: false
      status_codes: [200, 404]

    - method: "GET"
      path: "/api/v1/users/{user_id}/following"
      query: "?cursor=string&limit=int"
      response: "{ users: UserListItem[], next_cursor: string | null }"
      auth_required: false
      status_codes: [200, 404]

response_schemas:
  UserResponse: "{ id: uuid, email: string, username: string, display_name: string, bio: string, avatar_url: string | null, created_at: datetime }"
  UserProfileResponse: "{ id: uuid, username: string, display_name: string, bio: string, avatar_url: string | null, recipe_count: int, follower_count: int, following_count: int, is_following: bool | null }"
  UserListItem: "{ id: uuid, username: string, display_name: string, avatar_url: string | null }"
  RecipeListItem: "{ id: uuid, title: string, description: string, category: string, thumbnail_url: string | null, author: UserListItem, like_count: int, comment_count: int, cooking_time_minutes: int | null, is_liked: bool | null, is_bookmarked: bool | null, created_at: datetime }"
  RecipeDetailResponse: "{ id: uuid, title: string, description: string, category: string, cooking_time_minutes: int | null, servings: int | null, thumbnail_url: string | null, author: UserListItem, ingredients: Ingredient[], steps: Step[], tags: string[], like_count: int, comment_count: int, bookmark_count: int, is_liked: bool | null, is_bookmarked: bool | null, created_at: datetime, updated_at: datetime }"
  CommentResponse: "{ id: uuid, user: UserListItem, content: string, parent_id: uuid | null, created_at: datetime }"

next_step: 14
