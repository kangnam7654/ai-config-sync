      - "레시피 카드 스크롤 → 좋아요(하트 탭) / 북마크(아이콘 탭)"
      - "카드 탭 → 레시피 상세 → 댓글 작성"
      - "작성자 프로필 탭 → 팔로우 버튼"
      - "Popular 탭으로 전환 → 인기 레시피 탐색"

