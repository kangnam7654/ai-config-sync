      - "하단 네비 → 검색 아이콘"
      - "키워드 입력 또는 카테고리/태그 필터"
      - "결과 리스트 → 레시피 탭 → 상세"

  - name: "프로필 관리 플로우"
    steps:
      - "하단 네비 → 프로필 아이콘"
      - "내 레시피 / 북마크 탭 전환"
      - "팔로워/팔로잉 숫자 탭 → 목록"
      - "설정 → 프로필 편집 (이름, 소개, 아바타)"

