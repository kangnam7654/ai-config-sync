  recipe_detail:
    layout: "큰 썸네일(상단, 가로 풀) → 제목+작성자 바(아바타+이름+팔로우) → 메타(시간/인분) → 재료 섹션(체크리스트) → 단계 섹션(번호+텍스트+사진) → 고정 하단 바(좋아요+댓글+북마크)"
    key_elements: ["작성자 바(팔로우 버튼 포함)", "재료 체크리스트", "단계별 카드", "하단 인터랙션 바"]

  recipe_create:
    layout: "스크롤 폼 — 썸네일 업로드 → 기본 정보(제목, 설명, 카테고리 드롭다운, 시간, 인분) → 재료 섹션(동적 추가) → 단계 섹션(동적 추가) → 태그 입력 → 게시 버튼"
    key_elements: ["동적 리스트(+/- 버튼)", "사진 업로드 영역", "게시 버튼(primary)"]

  search:
    layout: "상단 검색 바 → 카테고리 칩 가로 스크롤 → 검색 결과 2열 그리드"
    key_elements: ["검색 바(돋보기 아이콘)", "카테고리 칩", "그리드 레시피 카드(작은 버전)"]

  profile:
    layout: "상단 프로필 영역(아바타 80px+이름+소개+팔로워/팔로잉 수+편집 버튼) → 탭(내 레시피/북마크) → 레시피 그리드"
    key_elements: ["프로필 카드", "팔로워/팔로잉 수(탭 가능)", "탭 바"]

  auth:
    layout: "중앙 정렬 — 앱 로고 + 이메일/비밀번호 입력 + 로그인 버튼 + 회원가입 전환 링크"
    key_elements: ["입력 필드", "primary 버튼", "전환 링크"]

